<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FILE MANIPULATOR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>FILE MANIPULATOR</h1>
    <p class="subtitle">CONVERT &amp; MANIPULATE ANY FILE</p>
  </header>

  <main>
    <!-- Step 1: Upload -->
    <section id="upload-section">
      <h2>01 — UPLOAD FILE</h2>
      <div id="drop-zone" role="button" tabindex="0" aria-label="Drop file here or click to select">
        <span id="drop-label">DROP FILE HERE OR CLICK TO SELECT</span>
        <input type="file" id="file-input" aria-label="Select file" />
      </div>
      <p id="file-info" class="hidden"></p>
    </section>

    <!-- Step 2: Edit & Preview -->
    <section id="edit-section" class="hidden">
      <h2>02 — EDIT & PREVIEW</h2>

      <!-- Image panel -->
      <div id="panel-image" class="edit-panel hidden">
        <img id="preview-image" alt="PREVIEW" />
        <div class="field-row">
          <label for="compress-slider">COMPRESSION QUALITY</label>
          <input type="range" id="compress-slider" min="0" max="100" value="80" />
          <span id="compress-value" class="slider-value">80</span>
        </div>
        <p id="estimated-size" class="info-text"></p>
      </div>

      <!-- Audio panel -->
      <div id="panel-audio" class="edit-panel hidden">
        <div id="waveform" class="waveform-container"></div>
        <div id="spectrogram" class="spectrogram-container hidden"></div>
        <div id="audio-controls" class="controls-row">
          <button type="button" id="audio-play" class="ctrl-btn">PLAY</button>
          <button type="button" id="audio-pause" class="ctrl-btn">PAUSE</button>
          <button type="button" id="audio-stop" class="ctrl-btn">STOP</button>
          <button type="button" id="audio-view-toggle" class="ctrl-btn">VIEW: SPECTROGRAM</button>
        </div>
        <div class="field-row">
          <label for="audio-trim-start">START TIME (s)</label>
          <input type="number" id="audio-trim-start" min="0" step="0.1" value="0" />
        </div>
        <div class="field-row">
          <label for="audio-trim-end">END TIME (s)</label>
          <input type="number" id="audio-trim-end" min="0" step="0.1" value="0" />
        </div>
        <div id="audio-info" class="info-panel">
          <p id="audio-duration-info" class="info-text"></p>
          <p id="audio-bitrate-info" class="info-text"></p>
          <p id="audio-samplerate-info" class="info-text"></p>
        </div>
        <div id="audio-metadata" class="metadata-form">
          <div class="field-row">
            <label for="meta-title">TITLE</label>
            <input type="text" id="meta-title" />
          </div>
          <div class="field-row">
            <label for="meta-artist">ARTIST</label>
            <input type="text" id="meta-artist" />
          </div>
          <div class="field-row">
            <label for="meta-album">ALBUM</label>
            <input type="text" id="meta-album" />
          </div>
          <div class="field-row">
            <label for="meta-year">YEAR</label>
            <input type="text" id="meta-year" />
          </div>
        </div>
      </div>

      <!-- Video panel -->
      <div id="panel-video" class="edit-panel hidden">
        <video id="preview-video" preload="metadata"></video>
        <div class="field-row">
          <label for="video-trim-start">TRIM START (s)</label>
          <input type="range" id="video-trim-start" min="0" max="100" step="0.1" value="0" />
          <span id="video-trim-start-val" class="slider-value">0.0</span>
        </div>
        <div class="field-row">
          <label for="video-trim-end">TRIM END (s)</label>
          <input type="range" id="video-trim-end" min="0" max="100" step="0.1" value="100" />
          <span id="video-trim-end-val" class="slider-value">0.0</span>
        </div>
      </div>

      <!-- PDF panel -->
      <div id="panel-pdf" class="edit-panel hidden">
        <div id="pdf-preview" class="pdf-preview-container"></div>
        <div id="pdf-options-grid" class="options-grid">
          <button type="button" class="grid-btn" data-action="pdf-to-word">CONVERT TO WORD</button>
          <button type="button" class="grid-btn" data-action="pdf-to-images">CONVERT TO IMAGES</button>
          <button type="button" class="grid-btn" data-action="pdf-compress">COMPRESS PDF</button>
          <button type="button" class="grid-btn" data-action="pdf-merge">MERGE PDFS</button>
          <button type="button" class="grid-btn" data-action="pdf-extract">EXTRACT PAGES</button>
        </div>
        <div id="pdf-merge-zone" class="hidden">
          <div id="pdf-drop-zone" class="sub-drop-zone" role="button" tabindex="0">
            <span>DROP SECOND PDF HERE</span>
            <input type="file" id="pdf-merge-input" accept="application/pdf" />
          </div>
        </div>
        <div id="pdf-extract-range" class="hidden">
          <div class="field-row">
            <label for="page-range">PAGE RANGE (e.g. 1-5)</label>
            <input type="text" id="page-range" placeholder="1-5" />
          </div>
        </div>
      </div>

      <!-- Generic panel -->
      <div id="panel-generic" class="edit-panel hidden">
        <div id="generic-icon" class="file-icon">📄</div>
        <div id="generic-info" class="info-panel">
          <p id="generic-name" class="info-text"></p>
          <p id="generic-ext" class="info-text"></p>
          <p id="generic-size" class="info-text"></p>
        </div>
        <div class="controls-row">
          <button type="button" id="btn-zip" class="ctrl-btn">COMPRESS TO .ZIP</button>
          <button type="button" id="btn-base64" class="ctrl-btn">CONVERT TO BASE64</button>
        </div>
      </div>
    </section>

    <!-- Step 3: Options -->
    <section id="options-section" class="hidden">
      <h2>03 — CONVERSION OPTIONS</h2>

      <div class="field-row">
        <label for="target-format">TARGET FORMAT</label>
        <select id="target-format"></select>
      </div>

      <!-- Image options -->
      <div id="image-options" class="hidden">
        <div class="field-row">
          <label for="quality">QUALITY (1–100)</label>
          <input type="number" id="quality" value="80" min="1" max="100" />
        </div>
      </div>

      <!-- Video options -->
      <div id="video-options" class="hidden">
        <div class="field-row">
          <label for="video-bitrate">VIDEO BITRATE (kbps, blank = auto)</label>
          <input type="number" id="video-bitrate" placeholder="e.g. 1000" min="100" />
        </div>
        <div class="field-row">
          <label for="resolution">WIDTH (px, blank = keep original)</label>
          <input type="number" id="resolution" placeholder="e.g. 1280" min="1" />
        </div>
        <div class="field-row">
          <label for="audio-bitrate-v">AUDIO BITRATE (kbps, blank = auto)</label>
          <input type="number" id="audio-bitrate-v" placeholder="e.g. 128" min="32" />
        </div>
      </div>

      <!-- Audio options -->
      <div id="audio-options" class="hidden">
        <div class="field-row">
          <label for="audio-bitrate">AUDIO BITRATE (kbps, blank = auto)</label>
          <input type="number" id="audio-bitrate" placeholder="e.g. 192" min="32" />
        </div>
      </div>

      <button id="convert-btn">CONVERT</button>
    </section>

    <!-- Step 4: Progress / Result -->
    <section id="result-section" class="hidden">
      <h2>04 — RESULT</h2>
      <div id="progress-bar-container" class="hidden">
        <div id="progress-bar"></div>
      </div>
      <p id="status-msg"></p>
      <a id="download-link" class="hidden" href="#" download>DOWNLOAD CONVERTED FILE</a>
      <button id="reset-btn" class="hidden">CONVERT ANOTHER FILE</button>
    </section>
  </main>

  <footer>
    <p>FILE MANIPULATOR — OPEN SOURCE</p>
  </footer>

  <script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/wavesurfer.min.js"
          integrity="sha384-H2PCRoIouweFaTCjeuXtjPmDXIg8cPTcdhsQ09jU6fPV0sOT+Uz8URYxUob0VzPL"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/plugin/wavesurfer.regions.min.js"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/plugin/wavesurfer.spectrogram.min.js"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"
          integrity="sha384-m5or9sW5FUT2WQbj3UthGceVpwo9zSgHKdCugYKHl19lyXPvwO/oQcmq8Fw0FfaA"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"
          integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"
          integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"
          integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG"
          crossorigin="anonymous"></script>
  <script src="panels.js"></script>
  <script src="app.js"></script>
</body>
</html>
